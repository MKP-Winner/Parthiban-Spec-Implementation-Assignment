<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Spec Implementation Assignment</title>
    <script src="script.js" defer></script>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            margin: 20px auto;
        }

        td {
            width: 25px;
            height: 25px;
            border: 1px solid #ccc;
        }

        .start { background-color: yellow; }
        .end { background-color: red; }
        .wall { background-color: black; }
        .visited { background-color: lightblue; }
        .path { background-color: green; }

        hr {
            margin: 20px 0;
        }

        .controls {
            margin-top: 20px;
        }

        input {
            margin: 5px;
        }
    </style>
</head>

<body>

<h2>BFS Pathfinder</h2>

<div>
    <div>Width →</div>
    <table id="grid"></table>
    <div>↓ Length</div>
</div>

<hr>
<div class="controls">

    Length:
    <input id="rows" type="number"><br>

    Width:
    <input id="cols" type="number"><br><br>

    <b>Start</b><br>
    X: <input id="startX" type="number">
    Y: <input id="startY" type="number"><br><br>

    <b>End</b><br>
    X: <input id="endX" type="number">
    Y: <input id="endY" type="number"><br><br>

    <button onclick="createGrid()">Create Grid</button>
    <button onclick="runBFS()">Run BFS</button>

    <p>Click cells to place walls</p>

</div>
</body>
</html>
